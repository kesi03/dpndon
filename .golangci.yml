linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - bodyclose
    - noctx

linters-settings:
  govet:
    check-shadowing: false
  goimports:
    local-prefixes: github.com/dpndon/dpndon

run:
  timeout: 5m
  modules-download-mode: readonly
