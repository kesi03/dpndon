name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (patch, minor, major, or exact like 1.0.0)'
        required: true
        default: 'patch'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build, Publish & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ---- Version bump ----
      - name: Bump version
        id: version
        run: |
          cd npm
          INPUT="${{ inputs.version }}"

          if [[ "$INPUT" == "patch" || "$INPUT" == "minor" || "$INPUT" == "major" ]]; then
            npm version "$INPUT" --no-git-tag-version
          else
            npm version "$INPUT" --no-git-tag-version
          fi

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      # ---- Build binaries (all platforms) ----
      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          go build -ldflags="-s -w" -trimpath -o dist/dpndon-${TAG}-linux-amd64 .
          cd dist && tar czf dpndon-${TAG}-linux-amd64.tar.gz dpndon-${TAG}-linux-amd64

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          go build -ldflags="-s -w" -trimpath -o dist/dpndon-${TAG}-linux-arm64 .
          cd dist && tar czf dpndon-${TAG}-linux-arm64.tar.gz dpndon-${TAG}-linux-arm64

      - name: Build darwin/amd64
        env:
          GOOS: darwin
          GOARCH: amd64
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          go build -ldflags="-s -w" -trimpath -o dist/dpndon-${TAG}-darwin-amd64 .
          cd dist && tar czf dpndon-${TAG}-darwin-amd64.tar.gz dpndon-${TAG}-darwin-amd64

      - name: Build darwin/arm64
        env:
          GOOS: darwin
          GOARCH: arm64
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          go build -ldflags="-s -w" -trimpath -o dist/dpndon-${TAG}-darwin-arm64 .
          cd dist && tar czf dpndon-${TAG}-darwin-arm64.tar.gz dpndon-${TAG}-darwin-arm64

      - name: Build windows/amd64
        env:
          GOOS: windows
          GOARCH: amd64
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          go build -ldflags="-s -w" -trimpath -o dist/dpndon-${TAG}-windows-amd64.exe .
          cd dist && 7z a dpndon-${TAG}-windows-amd64.zip dpndon-${TAG}-windows-amd64.exe

      # ---- Publish to npm ----
      - name: Publish to npm
        run: |
          cd npm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ---- Create GitHub Release ----
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip

      # ---- Push version commit and tag ----
      - name: Push changes
        run: |
          git add npm/package.json
          git commit -m "release: ${{ steps.version.outputs.tag }}"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin HEAD --follow-tags
