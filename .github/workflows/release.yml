name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: windows
            goarch: amd64
            runner: windows-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          output="dpndon-${GOOS}-${GOARCH}${ext}"
          go build -ldflags="-s -w" -trimpath -o "dist/${output}" .

      - name: Package (unix)
        if: matrix.goos != 'windows'
        run: |
          cd dist
          tar czf "dpndon-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "dpndon-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Package (windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          cd dist
          7z a "dpndon-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "dpndon-${{ matrix.goos }}-${{ matrix.goarch }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dpndon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true
