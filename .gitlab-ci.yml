stages:
  - test
  - build
  - publish

variables:
  GO_VERSION: "1.25"
  PACKAGE_NAME: dpndon

# ---------------------------------------------------------------------------
# Test
# ---------------------------------------------------------------------------
test:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - go build -o dpndon .
    - go vet ./...
    - go test -v -race ./...
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Build (cross-compile, upload to Generic Package Registry)
# ---------------------------------------------------------------------------
.build_template:
  stage: build
  image: golang:${GO_VERSION}
  script:
    - |
      ext=""
      if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
      BIN="dpndon-${GOOS}-${GOARCH}${ext}"
      go build -ldflags="-s -w" -trimpath -o "dist/${BIN}" .
    - |
      if [ "$GOOS" = "windows" ]; then
        ARCHIVE="dpndon-${GOOS}-${GOARCH}.zip"
        cd dist && 7z a "${ARCHIVE}" "${BIN}" && cd ..
      else
        ARCHIVE="dpndon-${GOOS}-${GOARCH}.tar.gz"
        cd dist && tar czf "${ARCHIVE}" "${BIN}" && cd ..
      fi
    - |
      FILENAME=$(ls dist/dpndon-${GOOS}-${GOARCH}.*)
      curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file "${FILENAME}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/${FILENAME}"
  artifacts:
    paths:
      - dist/

build:linux:amd64:
  extends: .build_template
  variables:
    GOOS: linux
    GOARCH: amd64
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

build:linux:arm64:
  extends: .build_template
  variables:
    GOOS: linux
    GOARCH: arm64
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

build:darwin:amd64:
  extends: .build_template
  variables:
    GOOS: darwin
    GOARCH: amd64
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

build:darwin:arm64:
  extends: .build_template
  variables:
    GOOS: darwin
    GOARCH: arm64
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

build:windows:amd64:
  extends: .build_template
  variables:
    GOOS: windows
    GOARCH: amd64
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

# ---------------------------------------------------------------------------
# Publish npm package to GitLab npm registry
# ---------------------------------------------------------------------------
publish:npm:
  stage: publish
  image: node:lts
  needs:
    - build:linux:amd64
    - build:linux:arm64
    - build:darwin:amd64
    - build:darwin:arm64
    - build:windows:amd64
  before_script:
    - echo "//gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" > npm/.npmrc
    - echo "registry=https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" >> npm/.npmrc
  script:
    - cd npm
    - npm publish --registry=https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
