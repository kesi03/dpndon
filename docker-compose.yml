services:
  dpndon:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DTRACK_URL=${DTRACK_URL:-}
      - DTRACK_API_KEY=${DTRACK_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - scan-targets:/targets
    restart: unless-stopped

volumes:
  scan-targets:
